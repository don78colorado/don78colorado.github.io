#champGrid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; justify-items: center; max-width: 1100px; margin: 0 auto; }
.champ-tile { background-color: #1a1a1a; border-radius: 8px; overflow: hidden; width: 150px; transition: transform 0.15s, box-shadow 0.15s; cursor: pointer; }

.champ-name { padding: 6px 0; font-size: 14px; color: #eee; background-color: #111; }
.champ-roles { font-size: 12px; color: #aaa; background-color: #111; padding-bottom: 6px; }

const champLink = name =>
  `https://mobalytics.gg/lol/champions/${name.toLowerCase().replace(/\s+/g, '')}/guide/`;
const grid = document.getElementById("champGrid");

champions.forEach(champ => {
  const tile = document.createElement("div");
  tile.className = "champ-tile";
  tile.onclick = () => window.open(champLink(champ.name), "_blank");
  const img = document.createElement("img");
  img.className = "champ-img";
  img.src = champImage(champ.name);
  img.alt = champ.name;
  const name = document.createElement("div");
  name.className = "champ-name";
  name.textContent = champ.name;
  const roles = document.createElement("div");
  roles.className = "champ-roles";
  roles.textContent = champ.roles.join(", ");
  tile.appendChild(img);
  tile.appendChild(name);
  tile.appendChild(roles);
  grid.appendChild(tile);
});
